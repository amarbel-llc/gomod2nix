name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    paths-ignore:
      - "**.md"
    branches:
      - master

# Every job routes through the justfile so CI, the local dev loop, and the
# spinclass merge hook share one source of truth (see justfile / AGENTS.md).
# `nix-shell -p just` provides the `just` binary; each recipe self-enters the
# devShell via `nix develop`, which needs flakes enabled.

jobs:
  lint-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - run: nix-shell -p just --run 'just lint-fmt'

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - run: nix-shell -p just --run 'just lint-go'

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - run: nix-shell -p just --run 'just test-go'

  validate-gomod2nix-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - run: nix-shell -p just --run 'just validate-gomod2nix-toml'

  list-tests:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - id: set-matrix
        run: |
          set -euo pipefail
          matrix="$(nix-shell -p just --run 'just list-tests' | jq --raw-input --slurp -rcM '{attr: split("\n")[:-1], os: ["ubuntu-latest"]}')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test-nix:
    needs: list-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJSON(needs.list-tests.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes
      - name: "Run test: ${{ matrix.attr }}"
        run: nix-shell -p just --run 'just test-nix-one ${{ matrix.attr }}'
